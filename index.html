<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLIP 7 - Official Rules</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a12;
            --fg: #e0e0ff;
            --muted: #4a4a6a;
            --accent: #00ffaa;
            --accent2: #ff00aa;
            --card-bg: #12121f;
            --border: #2a2a4a;
            --danger: #ff3366;
            --warning: #ffaa00;
            --success: #00ff88;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at 20% 20%, rgba(0, 255, 170, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 0, 170, 0.08) 0%, transparent 50%),
                linear-gradient(180deg, #0a0a12 0%, #0f0f1a 100%);
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 255, 170, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 170, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        header {
            text-align: center;
            padding: 15px 10px;
            border-bottom: 1px solid var(--border);
            background: rgba(10, 10, 18, 0.9);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }

        h1 {
            font-family: 'Orbitron', monospace;
            font-size: clamp(1.5rem, 5vw, 3.5rem);
            font-weight: 900;
            letter-spacing: 0.3em;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 20px rgba(0, 255, 170, 0.5));
        }

        .game-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            padding: 15px;
            gap: 15px;
            overflow-y: auto;
        }

        @media (min-width: 901px) {
            .game-container {
                display: grid;
                grid-template-columns: 250px 1fr 250px;
                gap: 20px;
                padding: 20px;
                overflow: visible;
            }
        }

        .players-panel {
            background: rgba(18, 18, 31, 0.8);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 15px;
            backdrop-filter: blur(10px);
        }

        .panel-title {
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
            color: var(--accent);
            margin-bottom: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        @media (max-width: 900px) {
            .players-panel {
                order: 1;
                padding: 10px 15px;
            }

            #playersList {
                display: flex;
                gap: 10px;
                overflow-x: auto;
                padding-bottom: 5px;
                scrollbar-width: none;
            }

            #playersList::-webkit-scrollbar {
                display: none;
            }
        }

        .player-card {
            background: rgba(30, 30, 50, 0.6);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            position: relative;
        }

        @media (max-width: 900px) {
            .player-card {
                min-width: 140px;
                flex-shrink: 0;
                margin-bottom: 0;
            }
        }

        .player-card.active {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 255, 170, 0.3);
        }

        .player-card.busted {
            border-color: var(--danger);
            opacity: 0.6;
        }

        .player-card.banked {
            border-color: var(--success);
            opacity: 0.8;
        }

        .player-card.winner {
            border-color: var(--warning);
            animation: winPulse 1s ease-in-out infinite;
        }

        @keyframes winPulse {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(255, 170, 0, 0.3);
            }

            50% {
                box-shadow: 0 0 40px rgba(255, 170, 0, 0.6);
            }
        }

        .player-name {
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .player-name .you-badge {
            font-size: 0.55rem;
            background: var(--accent);
            color: var(--bg);
            padding: 2px 5px;
            border-radius: 4px;
        }

        .player-name .status-badge {
            font-size: 0.55rem;
            padding: 2px 5px;
            border-radius: 4px;
            margin-left: auto;
        }

        .status-badge.busted {
            background: var(--danger);
            color: white;
        }

        .status-badge.banked {
            background: var(--success);
            color: black;
        }

        .player-score {
            font-family: 'Orbitron', monospace;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--accent);
            margin-top: 4px;
        }

        .player-round {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 4px;
        }

        .player-round strong {
            color: var(--warning);
        }

        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .game-area {
                order: 2;
                gap: 15px;
            }
        }

        .deck-area {
            display: flex;
            gap: 40px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .deck-stack {
            position: relative;
            width: 100px;
            height: 140px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        @media (max-width: 400px) {
            .deck-stack {
                width: 80px;
                height: 112px;
            }
        }

        .deck-stack:hover {
            transform: scale(1.05);
        }

        .deck-card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            border: 2px solid var(--accent2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 0, 170, 0.2);
        }

        .deck-card::before {
            content: '';
            position: absolute;
            inset: 6px;
            border: 1px solid rgba(255, 0, 170, 0.3);
            border-radius: 8px;
        }

        .deck-label {
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
            color: var(--accent2);
            text-align: center;
            margin-top: 10px;
            letter-spacing: 0.1em;
        }

        .deck-count {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 5px;
            text-align: center;
        }

        .active-cards {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            min-height: 140px;
            align-items: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 600px;
        }

        .active-cards-label {
            font-family: 'Orbitron', monospace;
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 0.2em;
            margin-bottom: 10px;
            width: 100%;
            text-align: center;
        }

        .card {
            width: 90px;
            height: 126px;
            perspective: 1000px;
            cursor: default;
            flex-shrink: 0;
        }

        @media (max-width: 400px) {
            .card {
                width: 70px;
                height: 98px;
            }
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.flipping .card-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .card-front {
            background: linear-gradient(135deg, #1e1e32 0%, #12121f 100%);
            border: 2px solid var(--accent);
            transform: rotateY(180deg);
        }

        .card-back {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            border: 2px solid var(--muted);
        }

        .card-value {
            font-family: 'Orbitron', monospace;
            font-size: 2.2rem;
            font-weight: 900;
        }

        @media (max-width: 400px) {
            .card-value {
                font-size: 1.8rem;
            }
        }

        .card-value.number {
            color: var(--fg);
            text-shadow: 0 0 20px currentColor;
        }

        .card-value.action {
            font-size: 0.75rem;
            color: #00ddff;
        }

        .card-value.modifier {
            font-size: 1.4rem;
            color: var(--warning);
        }

        .card-subtitle {
            font-size: 0.6rem;
            color: var(--muted);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .duplicate-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 51, 102, 0.3);
            border-radius: 8px;
            display: none;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            color: var(--danger);
            font-size: 1rem;
        }

        .card.duplicate .duplicate-overlay {
            display: flex;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .btn {
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
            font-weight: 700;
            padding: 15px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            position: relative;
            overflow: hidden;
            flex: 1;
        }

        @media (max-width: 400px) {
            .action-buttons {
                flex-direction: column;
            }

            .btn {
                padding: 18px;
            }
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-flip {
            background: linear-gradient(135deg, var(--accent) 0%, #00cc88 100%);
            color: var(--bg);
            box-shadow: 0 0 30px rgba(0, 255, 170, 0.4);
        }

        .btn-bank {
            background: linear-gradient(135deg, var(--warning) 0%, #ff8800 100%);
            color: var(--bg);
            box-shadow: 0 0 30px rgba(255, 170, 0, 0.3);
        }

        .btn-new-game {
            background: linear-gradient(135deg, var(--accent2) 0%, #cc0088 100%);
            color: var(--fg);
            box-shadow: 0 0 30px rgba(255, 0, 170, 0.3);
            padding: 10px 20px;
            font-size: 0.75rem;
        }

        .message-log {
            background: rgba(18, 18, 31, 0.8);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 15px;
            backdrop-filter: blur(10px);
            flex: 1;
            overflow-y: auto;
            min-height: 100px;
        }

        @media (max-width: 900px) {
            .message-log {
                order: 3;
                max-height: 150px;
            }
        }

        .log-entry {
            padding: 6px 10px;
            margin-bottom: 6px;
            border-radius: 6px;
            font-size: 0.8rem;
            background: rgba(0, 0, 0, 0.3);
            border-left: 3px solid var(--border);
        }

        .log-entry.bust {
            border-left-color: var(--danger);
            background: rgba(255, 51, 102, 0.1);
        }

        .log-entry.bank {
            border-left-color: var(--success);
            background: rgba(0, 255, 136, 0.1);
        }

        .log-entry.special {
            border-left-color: var(--warning);
            background: rgba(255, 170, 0, 0.1);
        }

        .log-entry.round {
            border-left-color: var(--accent2);
            background: rgba(255, 0, 170, 0.1);
            font-weight: bold;
            text-align: center;
            border-left: none;
            border-bottom: 2px solid var(--accent2);
        }

        .setup-screen {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 18, 0.98);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .setup-content {
            background: rgba(18, 18, 31, 0.9);
            border: 2px solid var(--accent);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 0 60px rgba(0, 255, 170, 0.2);
            animation: popIn 0.4s ease;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .setup-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 25px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .setup-option {
            margin-bottom: 20px;
        }

        .setup-label {
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 10px;
            display: block;
        }

        .player-count-btns {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .count-btn {
            padding: 12px;
            background: rgba(30, 30, 50, 0.6);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--fg);
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
            cursor: pointer;
        }

        .count-btn.selected {
            border-color: var(--accent);
            background: rgba(0, 255, 170, 0.1);
        }

        .btn-start {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
        }

        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        .status-message {
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
            text-align: center;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            border: 1px solid var(--border);
            color: var(--accent);
        }

        .status-message.danger {
            color: var(--danger);
            border-color: var(--danger);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="bg-container"></div>
    <div class="grid-overlay"></div>
    <div id="particles"></div>

    <div class="setup-screen" id="setupScreen">
        <div class="setup-content">
            <h2 class="setup-title">FLIP 7</h2>
            <div class="setup-option">
                <label class="setup-label">NUMBER OF PLAYERS</label>
                <div class="player-count-btns">
                    <button class="count-btn" data-count="2">2</button>
                    <button class="count-btn" data-count="3">3</button>
                    <button class="count-btn selected" data-count="4">4</button>
                    <button class="count-btn" data-count="5">5</button>
                    <button class="count-btn" data-count="6">6</button>
                </div>
            </div>
            <button class="btn btn-flip btn-start" id="startBtn">START GAME</button>
        </div>
    </div>

    <header>
        <h1>FLIP 7</h1>
    </header>

    <div class="game-container">
        <div class="players-panel">
            <div class="panel-title">Players</div>
            <div id="playersList"></div>
            <button class="btn btn-new-game" id="newGameBtn" style="width: 100%; margin-top: 10px;">New Game</button>
        </div>

        <div class="game-area">
            <div class="deck-area">
                <div>
                    <div class="deck-stack" id="deckStack">
                        <div class="deck-card" style="top: 4px; left: 2px; opacity: 0.5;"></div>
                        <div class="deck-card" style="top: 2px; left: 1px; opacity: 0.7;"></div>
                        <div class="deck-card"></div>
                    </div>
                    <div class="deck-label">DRAW PILE</div>
                    <div class="deck-count" id="deckCount">Cards: 0</div>
                </div>
            </div>

            <div class="active-cards" id="activeCards">
                <div class="active-cards-label">CURRENT HAND</div>
            </div>
            <div class="status-message" id="statusMessage">Your Turn</div>
            <div class="action-buttons" id="actionButtons">
                <button class="btn btn-flip" id="flipBtn">FLIP</button>
                <button class="btn btn-bank" id="bankBtn" disabled>BANK</button>
            </div>
        </div>

        <div class="message-log">
            <div class="panel-title">Game Log</div>
            <div id="logEntries"></div>
        </div>
    </div>

    <script>
        // ==================== CONFIG ====================
        const CONFIG = {
            TARGET_SCORE: 200,
            AI_DELAY_MIN: 600,
            AI_DELAY_MAX: 1200,
            ANIMATION_DURATION: 500
        };

        // ==================== CARD DEFINITIONS ====================
        const CARD_TYPES = {
            NUMBER: 'number',
            FREEZE: 'freeze',
            SECOND_CHANCE: 'secondChance',
            FLIP_THREE: 'flipThree',
            MODIFIER_ADD: 'modifierAdd', // +2, +4, etc
            MODIFIER_MULTI: 'modifierMulti' // x2
        };

        function createDeck() {
            const deck = [];

            // Number cards (79 total)
            // 0x1, 1x1
            deck.push({ type: CARD_TYPES.NUMBER, value: 0 });
            deck.push({ type: CARD_TYPES.NUMBER, value: 1 });

            // 2x2 ... 12x12
            for (let num = 2; num <= 12; num++) {
                for (let i = 0; i < num; i++) {
                    deck.push({ type: CARD_TYPES.NUMBER, value: num });
                }
            }

            // Action cards (9)
            for (let i = 0; i < 3; i++) deck.push({ type: CARD_TYPES.FREEZE, value: 'FREEZE' });
            for (let i = 0; i < 3; i++) deck.push({ type: CARD_TYPES.FLIP_THREE, value: 'FLIP 3' });
            for (let i = 0; i < 3; i++) deck.push({ type: CARD_TYPES.SECOND_CHANCE, value: '2ND CH' });

            // Modifiers (6)
            deck.push({ type: CARD_TYPES.MODIFIER_ADD, value: 2 });
            deck.push({ type: CARD_TYPES.MODIFIER_ADD, value: 4 });
            deck.push({ type: CARD_TYPES.MODIFIER_ADD, value: 6 });
            deck.push({ type: CARD_TYPES.MODIFIER_ADD, value: 8 });
            deck.push({ type: CARD_TYPES.MODIFIER_ADD, value: 10 });
            deck.push({ type: CARD_TYPES.MODIFIER_MULTI, value: 2 }); // x2

            return shuffleDeck(deck);
        }

        function shuffleDeck(deck) {
            const shuffled = [...deck];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // ==================== GAME STATE ====================
        const AI_NAMES = ['NOVA', 'CIPHER', 'PHANTOM', 'VORTEX', 'NEON', 'GLITCH'];

        let gameState = {
            players: [],
            deck: [],
            currentPlayerIndex: 0,
            currentRoundCards: [],
            phase: 'setup',
            playerCount: 4,
            isProcessing: false,
            flipThreeCount: 0 // Counter for Flip Three logic
        };

        // ==================== DOM ELEMENTS ====================
        const $ = id => document.getElementById(id);
        const elements = {
            setupScreen: $('setupScreen'), playersList: $('playersList'), activeCards: $('activeCards'),
            deckCount: $('deckCount'), statusMessage: $('statusMessage'),
            flipBtn: $('flipBtn'), bankBtn: $('bankBtn'), newGameBtn: $('newGameBtn'),
            startBtn: $('startBtn'), logEntries: $('logEntries'), particles: $('particles')
        };

        // ==================== PARTICLE SYSTEM ====================
        function createParticles(x, y, color, count = 20) {
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 8 + 4;
                const angle = (Math.PI * 2 * i) / count;
                const vel = Math.random() * 100 + 50;
                p.style.cssText = `left:${x}px; top:${y}px; width:${size}px; height:${size}px; background:${color}; box-shadow: 0 0 ${size * 2}px ${color};`;
                elements.particles.appendChild(p);
                let posX = x, posY = y, opacity = 1, f = 0;
                function anim() {
                    f++; posX += Math.cos(angle) * vel * 0.02; posY += Math.sin(angle) * vel * 0.02 + f * 0.1; opacity -= 0.02;
                    p.style.left = posX + 'px'; p.style.top = posY + 'px'; p.style.opacity = opacity;
                    if (opacity > 0) requestAnimationFrame(anim); else p.remove();
                }
                requestAnimationFrame(anim);
            }
        }

        // ==================== UI ====================
        function renderPlayers() {
            elements.playersList.innerHTML = '';
            gameState.players.forEach((p, i) => {
                const isActive = i === gameState.currentPlayerIndex;
                const card = document.createElement('div');
                let cls = 'player-card';
                let badge = '';

                if (p.isWinner) cls += ' winner';
                else if (p.roundStatus === 'busted') { cls += ' busted'; badge = '<span class="status-badge busted">BUST</span>'; }
                else if (p.roundStatus === 'banked') { cls += ' banked'; badge = '<span class="status-badge banked">BANK</span>'; }
                else if (isActive) cls += ' active';

                card.className = cls;
                card.innerHTML = `
                    <div class="player-name">${p.name} ${!p.isAI ? '<span class="you-badge">YOU</span>' : ''} ${badge}</div>
                    <div class="player-score">${p.totalScore}</div>
                    <div class="player-round">Round: <strong>${p.currentRoundScore}</strong> pts ${p.hasSecondChance ? '<span style="color:var(--warning)">[2ND]</span>' : ''}</div>
                `;
                elements.playersList.appendChild(card);
            });
        }

        function renderActiveCards() {
            elements.activeCards.innerHTML = '<div class="active-cards-label">CURRENT HAND</div>';
            gameState.currentRoundCards.forEach((c, i) => {
                const el = createCardElement(c, i);
                elements.activeCards.appendChild(el);
                setTimeout(() => el.classList.add('flipping'), 50 + i * 30);
            });
        }

        function createCardElement(card, index) {
            const el = document.createElement('div');
            el.className = 'card';
            el.dataset.index = index;

            let valClass = '', disp = card.value, sub = '';

            if (card.type === CARD_TYPES.NUMBER) { valClass = 'number'; sub = card.value; }
            else if (card.type === CARD_TYPES.FREEZE) { valClass = 'action'; disp = 'FREEZE'; sub = 'BANK'; }
            else if (card.type === CARD_TYPES.SECOND_CHANCE) { valClass = 'action'; disp = '2ND'; sub = 'CHANCE'; }
            else if (card.type === CARD_TYPES.FLIP_THREE) { valClass = 'action'; disp = 'FLIP 3'; sub = 'ACTION'; }
            else if (card.type === CARD_TYPES.MODIFIER_ADD) { valClass = 'modifier'; disp = `+${card.value}`; sub = 'ADD'; }
            else if (card.type === CARD_TYPES.MODIFIER_MULTI) { valClass = 'modifier'; disp = `x${card.value}`; sub = 'MULTI'; }

            el.innerHTML = `
                <div class="card-inner">
                    <div class="card-back"></div>
                    <div class="card-front">
                        <span class="card-number-badge">#${index + 1}</span>
                        <span class="card-value ${valClass}">${disp}</span>
                        <span class="card-subtitle">${sub}</span>
                    </div>
                </div>
                <div class="duplicate-overlay">DUP!</div>
            `;
            return el;
        }

        function updateDeckCount() { elements.deckCount.textContent = `Cards: ${gameState.deck.length}`; }
        function setStatus(msg, type = '') { elements.statusMessage.textContent = msg; elements.statusMessage.className = 'status-message ' + type; }
        function addLog(msg, type = '') {
            const e = document.createElement('div'); e.className = `log-entry ${type}`; e.textContent = msg;
            elements.logEntries.insertBefore(e, elements.logEntries.firstChild);
            while (elements.logEntries.children.length > 30) elements.logEntries.removeChild(elements.logEntries.lastChild);
        }

        // ==================== GAME LOGIC ====================
        function initGame() {
            gameState.players = [{
                name: 'PLAYER', isAI: false, totalScore: 0, currentRoundScore: 0,
                hasSecondChance: false, roundStatus: 'playing', isWinner: false
            }];
            const shuffledNames = shuffleDeck([...AI_NAMES]);
            for (let i = 1; i < gameState.playerCount; i++) {
                gameState.players.push({
                    name: shuffledNames[i - 1], isAI: true, totalScore: 0, currentRoundScore: 0,
                    hasSecondChance: false, roundStatus: 'playing', isWinner: false
                });
            }
            gameState.deck = createDeck();
            gameState.currentPlayerIndex = 0;
            gameState.currentRoundCards = [];
            gameState.phase = 'playing';
            gameState.isProcessing = false;

            elements.logEntries.innerHTML = '';
            renderPlayers(); renderActiveCards(); updateDeckCount();
            setStatus('Your Turn'); updateButtons();
            addLog('Game started! First to 200 wins.');
        }

        function updateButtons() {
            const p = gameState.players[gameState.currentPlayerIndex];
            const isHuman = p && !p.isAI;
            // Can bank if have at least one number card
            const canBank = gameState.currentRoundCards.some(c => c.type === CARD_TYPES.NUMBER);
            elements.flipBtn.disabled = !isHuman || gameState.isProcessing || gameState.phase !== 'playing';
            elements.bankBtn.disabled = !isHuman || gameState.isProcessing || !canBank || gameState.phase !== 'playing';
        }

        function drawCard() {
            if (gameState.deck.length === 0) { gameState.deck = createDeck(); addLog('Deck reshuffled!'); }
            return gameState.deck.pop();
        }

        // ** FIXED SCORING LOGIC **
        function calculateFinalScore() {
            let score = 0;
            let multiplier = 1;
            const numbers = [];

            // 1. Sum numbers and collect unique ones
            gameState.currentRoundCards.forEach(c => {
                if (c.type === CARD_TYPES.NUMBER) {
                    score += c.value;
                    numbers.push(c.value);
                } else if (c.type === CARD_TYPES.MODIFIER_ADD) {
                    score += c.value;
                } else if (c.type === CARD_TYPES.MODIFIER_MULTI) {
                    multiplier *= c.value;
                }
            });

            // 2. Check Flip 7 Bonus (7 unique numbers)
            const unique = [...new Set(numbers)];
            if (unique.length >= 7) {
                score += 15;
                addLog("FLIP 7 BONUS! +15 points", 'special');
                createParticles(window.innerWidth / 2, window.innerHeight / 2, '#ffaa00', 50);
            }

            // 3. Apply multiplier
            score = Math.floor(score * multiplier);

            return score;
        }

        function hasDuplicateNumber(card) {
            if (card.type !== CARD_TYPES.NUMBER) return false;
            return gameState.currentRoundCards.some(c => c.type === CARD_TYPES.NUMBER && c.value === card.value);
        }

        function flipCard() {
            if (gameState.isProcessing || gameState.phase !== 'playing') return;
            const player = gameState.players[gameState.currentPlayerIndex];
            if (player.roundStatus !== 'playing') { nextTurn(); return; }

            gameState.isProcessing = true;

            const card = drawCard();
            updateDeckCount();
            const isDuplicate = hasDuplicateNumber(card);

            gameState.currentRoundCards.push(card);

            const cardEl = createCardElement(card, gameState.currentRoundCards.length - 1);
            if (isDuplicate) cardEl.classList.add('duplicate');
            elements.activeCards.appendChild(cardEl);
            setTimeout(() => cardEl.classList.add('flipping'), 50);

            // Particles
            const rect = cardEl.getBoundingClientRect();
            setTimeout(() => {
                const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
                if (isDuplicate) createParticles(cx, cy, '#ff3366', 40);
                else if (card.type === CARD_TYPES.FREEZE) createParticles(cx, cy, '#00ddff', 30);
                else if (card.type === CARD_TYPES.SECOND_CHANCE || card.type === CARD_TYPES.MODIFIER_ADD || card.type === CARD_TYPES.MODIFIER_MULTI) createParticles(cx, cy, '#ffaa00', 30);
                else if (card.type === CARD_TYPES.FLIP_THREE) createParticles(cx, cy, '#ff00aa', 30);
                else createParticles(cx, cy, '#00ffaa', 15);
            }, CONFIG.ANIMATION_DURATION / 2);

            setTimeout(() => handleCardEffect(card, player, isDuplicate), CONFIG.ANIMATION_DURATION);
        }

        function handleCardEffect(card, player, isDuplicate) {
            // 1. Handle Duplicate (Bust)
            if (isDuplicate) {
                if (player.hasSecondChance) {
                    player.hasSecondChance = false;
                    gameState.currentRoundCards.pop(); // remove the duplicate card from visuals/score calc
                    const dupEl = elements.activeCards.querySelector('.card:last-child');
                    if (dupEl) dupEl.remove();
                    addLog(`${player.name} used Second Chance!`, 'special');
                    player.currentRoundScore = calculateFinalScore(); // Recalc display score
                    renderPlayers();
                    gameState.isProcessing = false;
                    updateButtons();
                    if (player.isAI) setTimeout(aiTurn, CONFIG.AI_DELAY_MIN);
                    return;
                }
                // BUST
                player.roundStatus = 'busted';
                player.currentRoundScore = 0;
                setStatus(`${player.name} BUSTED!`, 'danger');
                addLog(`${player.name} BUSTED with duplicate ${card.value}!`, 'bust');
                renderPlayers();
                setTimeout(() => { gameState.currentRoundCards = []; renderActiveCards(); nextTurn(); }, 1000);
                return;
            }

            // 2. Handle Special Cards
            if (card.type === CARD_TYPES.FREEZE) {
                const score = calculateFinalScore();
                player.totalScore += score;
                player.currentRoundScore = score; // Display logic
                player.roundStatus = 'banked';
                addLog(`${player.name} drew FREEZE! Banked ${score} points.`, 'special');
                if (player.totalScore >= CONFIG.TARGET_SCORE) { endGame(player); return; }
                setTimeout(() => { gameState.currentRoundCards = []; renderActiveCards(); nextTurn(); }, 500);
                return;
            }

            if (card.type === CARD_TYPES.SECOND_CHANCE) {
                player.hasSecondChance = true;
                addLog(`${player.name} got Second Chance!`, 'special');
            }

            if (card.type === CARD_TYPES.FLIP_THREE) {
                addLog(`${player.name} drew FLIP THREE! Flipping 3 more...`, 'special');
                // We need to unlock processing to allow the recursive flips
                gameState.isProcessing = false;
                // Trigger 3 more flips
                setTimeout(() => flipCard(), CONFIG.ANIMATION_DURATION);
                setTimeout(() => flipCard(), CONFIG.ANIMATION_DURATION * 2);
                setTimeout(() => flipCard(), CONFIG.ANIMATION_DURATION * 3);
                return;
            }

            // 3. Update Score Display
            player.currentRoundScore = calculateFinalScore();
            renderPlayers();

            // 4. Continue
            setStatus(`${player.name}: ${player.currentRoundScore} pts`);
            gameState.isProcessing = false;
            updateButtons();

            if (player.isAI) setTimeout(aiTurn, CONFIG.AI_DELAY_MIN + Math.random() * CONFIG.AI_DELAY_MAX);
        }

        function bankPoints() {
            if (gameState.isProcessing || gameState.phase !== 'playing') return;
            gameState.isProcessing = true;
            const player = gameState.players[gameState.currentPlayerIndex];

            const score = calculateFinalScore(); // ** USE FINAL SCORE CALCULATION **
            player.totalScore += score;
            player.currentRoundScore = score;
            player.roundStatus = 'banked';

            addLog(`${player.name} banked ${score} points! Total: ${player.totalScore}`, 'bank');
            createParticles(window.innerWidth / 2, window.innerHeight / 2, '#ffaa00', 30);

            if (player.totalScore >= CONFIG.TARGET_SCORE) { endGame(player); return; }

            gameState.currentRoundCards = [];
            renderActiveCards();
            nextTurn();
        }

        function nextTurn() {
            gameState.isProcessing = false;
            let nextIdx = (gameState.currentPlayerIndex + 1) % gameState.players.length;
            let found = false, loops = 0;

            while (loops < gameState.players.length) {
                if (gameState.players[nextIdx].roundStatus === 'playing') {
                    gameState.currentPlayerIndex = nextIdx;
                    found = true;
                    break;
                }
                nextIdx = (nextIdx + 1) % gameState.players.length;
                loops++;
            }

            if (!found) { endRound(); return; }

            const p = gameState.players[gameState.currentPlayerIndex];
            gameState.currentRoundCards = [];
            renderActiveCards(); renderPlayers();

            if (p.isAI) { setStatus(`${p.name} thinking...`); updateButtons(); setTimeout(aiTurn, CONFIG.AI_DELAY_MIN); }
            else { setStatus('Your Turn'); updateButtons(); }
        }

        function endRound() {
            addLog('--- ROUND ENDED ---', 'round');
            const winner = gameState.players.find(p => p.totalScore >= CONFIG.TARGET_SCORE);
            if (winner) { endGame(winner); return; }

            // Reset for new round
            addLog('New Round Started!', 'round');
            gameState.players.forEach(p => { p.roundStatus = 'playing'; p.currentRoundScore = 0; });
            gameState.currentRoundCards = [];
            gameState.currentPlayerIndex = 0;

            renderPlayers(); renderActiveCards();
            const p = gameState.players[0];
            if (p.isAI) { setStatus(`${p.name} thinking...`); updateButtons(); setTimeout(aiTurn, CONFIG.AI_DELAY_MIN); }
            else { setStatus('Your Turn'); updateButtons(); }
        }

        // ==================== AI ====================
        function aiTurn() {
            if (gameState.phase !== 'playing') return;
            const p = gameState.players[gameState.currentPlayerIndex];
            if (!p.isAI || gameState.isProcessing || p.roundStatus !== 'playing') return;

            const score = calculateFinalScore(); // Check current potential score
            const nums = gameState.currentRoundCards.filter(c => c.type === CARD_TYPES.NUMBER).map(c => c.value);
            const risk = nums.length * 0.08;
            const need = CONFIG.TARGET_SCORE - p.totalScore;
            const agg = Math.min(1, need / 100);
            const safe = p.hasSecondChance ? 0.2 : 0.5;

            const shouldBank = score >= 12 && (risk > safe - agg * 0.2 || score >= 20 || (p.totalScore + score >= CONFIG.TARGET_SCORE));

            if (shouldBank || (p.totalScore + score >= CONFIG.TARGET_SCORE)) bankPoints();
            else flipCard();
        }

        // ==================== EVENTS ====================
        document.querySelectorAll('.count-btn').forEach(b => {
            b.addEventListener('click', () => {
                document.querySelectorAll('.count-btn').forEach(x => x.classList.remove('selected'));
                b.classList.add('selected');
                gameState.playerCount = parseInt(b.dataset.count);
            });
        });

        elements.startBtn.addEventListener('click', () => { elements.setupScreen.classList.add('hidden'); initGame(); });
        elements.flipBtn.addEventListener('click', flipCard);
        elements.bankBtn.addEventListener('click', bankPoints);
        elements.newGameBtn.addEventListener('click', () => { gameState.phase = 'setup'; elements.setupScreen.classList.remove('hidden'); });

        document.addEventListener('keydown', e => {
            if (gameState.phase !== 'playing') return;
            const p = gameState.players[gameState.currentPlayerIndex];
            if (p.isAI) return;
            if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
            else if (e.key === 'b' || e.key === 'B') bankPoints();
        });

        updateButtons();
    </script>
</body>

</html>
